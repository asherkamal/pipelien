services:
  pipeline:
    build: .
    env_file: .env
    volumes:
      - ./output_dataset:/app/output_dataset
      - ./models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 20g
